  @media (prefers-color-scheme: dark) {

      --ink: #F5F5F7; --ink-2: #D1D1D6; --muted: #98989D; --soft: #6E6E73;

  * { box-sizing: border-box; }

  a { color: var(--accent); text-decoration: none; }

  .topbar { position: sticky; top: 0; z-index: 10; background: color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid var(--rule-soft); }

  .topnav a:hover { color: var(--ink); text-decoration: none; }

  .legal-hero { padding: clamp(48px, 8vw, 80px) 0 clamp(24px, 4vw, 40px); }
  .legal-hero .crumb { font-size: 13px; color: var(--muted); margin: 0 0 12px; }
  .legal-hero .crumb a { color: var(--muted); text-decoration: none; }
  .legal-hero .crumb a:hover { color: var(--ink); text-decoration: underline; }
  .legal-hero h1 { font-size: clamp(34px, 5vw, 48px); font-weight: 700; line-height: 1.1; letter-spacing: -0.022em; margin: 0 0 12px; color: var(--ink); }
  .legal-hero .lede { font-size: clamp(17px, 1.6vw, 19px); color: var(--muted); margin: 0; max-width: 560px; }

  .legal-app { padding: clamp(16px, 3vw, 32px) 0 clamp(56px, 8vw, 96px); }
  .app { background: var(--surface); border-radius: var(--radius-card); padding: clamp(20px, 3vw, 28px); display: grid; grid-template-columns: 64px 1fr; gap: 18px; align-items: center; border: 1px solid var(--rule-soft); margin-bottom: 16px; }
  .app-icon { width: 64px; height: 64px; border-radius: var(--radius-icon); overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06); background: var(--surface-2); }
  .app-icon img { width: 100%; height: 100%; object-fit: cover; }
  .app-meta .name { font-size: 19px; font-weight: 600; margin: 0 0 2px; color: var(--ink); }
  .app-meta .alt { font-size: 14px; color: var(--muted); margin: 0; }

  .doc-list { display: grid; gap: 12px; }
  .doc-link { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; background: var(--surface); border: 1px solid var(--rule-soft); border-radius: var(--radius-card); color: var(--ink); transition: background .2s ease, border-color .2s ease, transform .2s ease; }
  .doc-link:hover { background: var(--surface-2); border-color: var(--rule); text-decoration: none; transform: translateY(-1px); }
  .doc-link .doc-title { font-size: 17px; font-weight: 600; margin: 0 0 2px; }
  .doc-link .doc-sub { font-size: 13px; color: var(--muted); margin: 0; }
  .doc-link .arrow { color: var(--muted); font-size: 18px; }

  footer { border-top: 1px solid var(--rule-soft); padding: 24px 0; color: var(--soft); font-size: 12px; }
  footer .row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  footer a { color: var(--muted); }
  footer a:hover { color: var(--ink); text-decoration: none; }
</style>
